<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Namify - 3D Name Art Generator</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "black-bg": "#050505",
                        "card-bg": "#111111"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Inter"]
                    }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24; }
        body { background-color: #050505; color: #ffffff; }
        
        /* 3D Gold Text Gradient */
        .gold-3d-text {
            background: linear-gradient(to bottom, #FFF5D1 0%, #F2CA50 45%, #D4AF37 55%, #8A6E2F 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0px 2px 2px rgba(0,0,0,0.5));
        }

        /* 3D Gold Button Gradient */
        .gold-3d-button {
            background: linear-gradient(180deg, #FFE088 0%, #D4AF37 50%, #B8860B 100%);
            box-shadow: 0 4px 0 #735c00, 0 10px 20px rgba(212, 175, 55, 0.2);
            border-top: 1px solid rgba(255, 255, 255, 0.4);
            transition: all 0.2s ease;
        }

        .gold-3d-button:active {
            box-shadow: 0 1px 0 #735c00;
            transform: translateY(3px);
        }

        /* Glass Footer Buttons */
        .glass-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(212, 175, 55, 0.2);
            backdrop-filter: blur(10px);
        }
        .glass-btn:hover {
            border-color: #F2CA50;
            background: rgba(212, 175, 55, 0.05);
        }
    </style>
</head>
<body class="font-body antialiased">

<header class="fixed top-0 w-full z-50 bg-black/90 backdrop-blur-xl border-b border-white/5">
    <div class="flex justify-between items-center px-6 py-4 w-full max-w-md mx-auto">
        <div class="flex items-center gap-2">
            <span class="material-symbols-outlined text-[#F2CA50] text-2xl" style='font-variation-settings: "FILL" 1;'>square</span>
            <div class="text-xl font-black tracking-tighter gold-3d-text font-headline uppercase">NAMIFY</div>
        </div>
        <a href="https://play.google.com/store/apps/details?id=com.art.namify1" target="_blank">
            <button class="gold-3d-button text-black font-bold text-[10px] px-4 py-2 rounded-lg uppercase tracking-wider">DOWNLOAD</button>
        </a>
    </div>
</header>

<main class="pt-24 pb-20 max-w-md mx-auto overflow-hidden">
    <section class="px-6 py-8 flex flex-col items-center text-center">
        <h1 class="font-headline font-extrabold text-5xl leading-[1.1] tracking-tighter mb-6 text-white">
            Transform Your Name into <span class="gold-3d-text">3D Luxury Art</span>
        </h1>
        <p class="text-neutral-400 text-base mb-10">Create stunning metallic and crystal typography in one click.</p>
        
        <div class="w-full aspect-square mb-10 rounded-2xl overflow-hidden border border-white/10 shadow-[0_20px_50px_rgba(0,0,0,0.8)]">
            <img alt="Hero Art" class="w-full h-full object-cover" src="https://i.ibb.co/KcYWXcMn/Namify-1774004765052.jpg"/>
        </div>

        <a href="https://play.google.com/store/apps/details?id=com.art.namify1" target="_blank" class="w-full">
            <button class="gold-3d-button w-full text-[#1a1a1a] font-black text-lg py-4 rounded-2xl flex items-center justify-center gap-3">
                <span class="material-symbols-outlined font-black">play_arrow</span>
                <span>GET ON GOOGLE PLAY</span>
            </button>
        </a>
    </section>

    <section class="px-6 py-12">
        <h2 class="font-headline font-bold text-2xl tracking-tight mb-8 text-white">The Collection</h2>
        <div class="grid grid-cols-2 gap-3">
            <div class="rounded-xl overflow-hidden aspect-[4/5] border border-white/5"><img src="https://i.ibb.co/XxStSHKh/c511082c-849a-42d0-b6d8-bb9eb46c943a.jpg" class="w-full h-full object-cover"/></div>
            <div class="rounded-xl overflow-hidden aspect-[4/5] mt-8 border border-white/5"><img src="https://i.ibb.co/wFVr0g1N/6ef4f788-1f83-42b2-9afe-27cc2e7c8736.jpg" class="w-full h-full object-cover"/></div>
            <div class="rounded-xl overflow-hidden aspect-[4/5] -mt-4 border border-white/5"><img src="https://i.ibb.co/p6XX7KR5/d449770d-d348-49c8-a1e4-7eff1995bc3e.jpg" class="w-full h-full object-cover"/></div>
            <div class="rounded-xl overflow-hidden aspect-[4/5] mt-4 border border-white/5"><img src="https://i.ibb.co/YFw2jDmX/Namify-1773194733992.jpg" class="w-full h-full object-cover"/></div>
        </div>
    </section>
</main>

<footer class="bg-black py-16 px-6 text-center border-t border-white/10">
    <div class="gold-3d-text font-black font-headline text-3xl mb-12 tracking-tighter uppercase">NAMIFY</div>
    
    <div class="flex flex-col gap-4 max-w-xs mx-auto">
        <a href="https://sites.google.com/view/namify-privacypolicy" target="_blank" class="glass-btn flex items-center justify-center gap-2 text-white py-4 rounded-2xl transition-all">
            <span class="material-symbols-outlined text-[#F2CA50] text-xl">security</span>
            <span class="text-xs font-bold tracking-widest uppercase">Privacy Policy</span>
        </a>
        
        <a href="mailto:Ownersohel@gmail.com" class="glass-btn flex items-center justify-center gap-2 text-white py-4 rounded-2xl transition-all">
            <span class="material-symbols-outlined text-[#F2CA50] text-xl">mail</span>
            <span class="text-xs font-bold tracking-widest uppercase">Contact Support</span>
        </a>
    </div>

    <div class="mt-12 text-[10px] text-neutral-600 tracking-[0.3em] uppercase">
        © 2026 DIGITAL ATELIER • PREMIUM EXPERIENCE
    </div>
</footer>

</body>
</html>
